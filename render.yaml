# Render Blueprint — adjust service name / region as needed.
# Link a PostgreSQL instance and set env vars in the dashboard:
# DATABASE_URL (from DB), JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, CORS_ORIGIN (your frontend URL).
services:
  - type: web
    name: safepath-api
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    # Runs after build, before traffic switches — best place for migrations (DB + DATABASE_URL available).
    preDeployCommand: npm run db:migrate
